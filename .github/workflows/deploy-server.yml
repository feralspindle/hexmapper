name: Deploy server

# Builds the Rust API image on GitHub's runners, pushes it to GHCR, then tells the
# droplet to pull + restart. Keeps the heavy Rust build off the droplet.

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - 'server/**'
      - 'deploy/**'
      - '.github/workflows/deploy-server.yml'

concurrency:
  group: deploy-server
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  test:
    uses: ./.github/workflows/test-backend.yml

  database:
    uses: ./.github/workflows/test-database.yml

  build-push-deploy:
    needs: [test, database]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compute image name (GHCR requires lowercase)
        env:
          OWNER: ${{ github.repository_owner }}
        run: echo "IMAGE=ghcr.io/${OWNER,,}/hexmap-server" >> "$GITHUB_ENV"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ./server
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Pull + restart on droplet
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          HOST: ${{ secrets.DEPLOY_HOST }}
          USER: ${{ secrets.DEPLOY_USER }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts 2>/dev/null
          # Best-effort refresh of compose/Caddyfile (no-op if the droplet repo can't
          # auth a pull), then deploy.sh pulls the new image + restarts.
          ssh -i ~/.ssh/id_ed25519 "$USER@$HOST" \
            'git -C /opt/hexmap/repo pull --ff-only 2>/dev/null || true; bash /opt/hexmap/repo/deploy/deploy.sh'
