name: Deploy server

# Builds the Rust API image on GitHub's runners, pushes it to GHCR, then tells the
# droplet to pull + restart. Keeps the heavy Rust build off the droplet.

on:
  workflow_dispatch: {}
  push:
    branches: [main, staging]
    paths:
      - 'server/**'
      - 'deploy/**'
      - 'supabase/migrations/**'
      - '.github/workflows/deploy-server.yml'
      - '.github/workflows/test-e2e.yml'

concurrency:
  group: deploy-server-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  test:
    uses: ./.github/workflows/test-backend.yml

  database:
    uses: ./.github/workflows/test-database.yml

  # Apply pending migrations to the live environment DB BEFORE the new image
  # restarts (expand-contract: schema leads code). Gated behind the from-scratch
  # pgTAP gate so a migration that can't build cleanly never reaches a live DB.
  # This is what replaces running migrations by hand. See deploy/reconcile-drift.md.
  migrate:
    needs: [test, database]
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'production' || 'staging' }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: 2.90.0

      - name: Apply migrations to ${{ github.ref_name }} Supabase
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          supabase link --project-ref "$PROJECT_REF"
          # --include-all applies every local migration not yet on the remote;
          # non-interactive because SUPABASE_DB_PASSWORD is set.
          supabase db push --include-all

  build-push-deploy:
    needs: [test, database, migrate]
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'production' || 'staging' }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute image name (GHCR requires lowercase)
        env:
          OWNER: ${{ github.repository_owner }}
        run: |
          echo "IMAGE=ghcr.io/${OWNER,,}/hexmap-server" >> "$GITHUB_ENV"
          echo "IMAGE_SHA=ghcr.io/${OWNER,,}/hexmap-server:${GITHUB_SHA}" >> "$GITHUB_ENV"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ./server
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Pull + restart on droplet
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          HOST: ${{ secrets.DEPLOY_HOST }}
          USER: ${{ secrets.DEPLOY_USER }}
          BRANCH: ${{ github.ref_name }}
          API_IMAGE_OVERRIDE: ${{ env.IMAGE_SHA }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts 2>/dev/null
          ssh -i ~/.ssh/id_ed25519 "$USER@$HOST" \
            "set -eu; cd /opt/hexmap/repo; git fetch origin '$BRANCH'; git checkout '$BRANCH'; git pull --ff-only origin '$BRANCH'; API_IMAGE_OVERRIDE='$API_IMAGE_OVERRIDE' bash deploy/deploy.sh"

  # Post-deploy liveness check against the live URL: SPA is served (Caddy + cert + CDN)
  # and the API answers (/api/healthz -> "ok", proving the container is up and proxied).
  # SMOKE_URL is a per-environment variable; the job no-ops if it isn't set.
  smoke:
    needs: build-push-deploy
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'production' || 'staging' }}
    steps:
      - name: Post-deploy smoke test
        env:
          SMOKE_URL: ${{ vars.SMOKE_URL }}
        run: |
          if [ -z "$SMOKE_URL" ]; then
            echo "::warning::SMOKE_URL not set for this environment; skipping smoke test"
            exit 0
          fi
          echo "Smoke-testing $SMOKE_URL (retrying to allow for the container restart)"
          root=000; health=""
          for i in $(seq 1 12); do
            root=$(curl -s -o /dev/null -w '%{http_code}' --max-time 10 "$SMOKE_URL/" || echo 000)
            health=$(curl -s --max-time 10 "$SMOKE_URL/api/healthz" || echo "")
            echo "  attempt $i: GET / -> $root ; GET /api/healthz -> '${health:-<none>}'"
            if [ "$root" = "200" ] && [ "$health" = "ok" ]; then
              echo "✔ smoke passed: SPA served and API healthy"
              exit 0
            fi
            sleep 6
          done
          echo "::error::smoke test failed for $SMOKE_URL (last: root=$root health='${health:-<none>}')"
          exit 1

  e2e-staging:
    needs: build-push-deploy
    if: github.ref_name == 'staging'
    runs-on: ubuntu-latest
    environment: staging
    env:
      E2E_BASE_URL: ${{ secrets.E2E_BASE_URL }}
      E2E_GM_EMAIL: ${{ secrets.E2E_GM_EMAIL }}
      E2E_GM_PASSWORD: ${{ secrets.E2E_GM_PASSWORD }}
      E2E_PLAYER1_EMAIL: ${{ secrets.E2E_PLAYER1_EMAIL }}
      E2E_PLAYER1_PASSWORD: ${{ secrets.E2E_PLAYER1_PASSWORD }}
      E2E_PLAYER2_EMAIL: ${{ secrets.E2E_PLAYER2_EMAIL }}
      E2E_PLAYER2_PASSWORD: ${{ secrets.E2E_PLAYER2_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - name: Check E2E secrets
        id: e2e-config
        run: |
          missing=0
          for name in E2E_BASE_URL E2E_GM_EMAIL E2E_GM_PASSWORD E2E_PLAYER1_EMAIL E2E_PLAYER1_PASSWORD E2E_PLAYER2_EMAIL E2E_PLAYER2_PASSWORD; do
            if [ -z "${!name}" ]; then
              echo "::warning::$name is not configured; skipping E2E run"
              missing=1
            fi
          done
          if [ "$missing" -eq 0 ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        if: steps.e2e-config.outputs.ready == 'true'
        with:
          node-version: 20
          cache: npm

      - run: npm ci
        if: steps.e2e-config.outputs.ready == 'true'

      - run: npx playwright install --with-deps chromium
        if: steps.e2e-config.outputs.ready == 'true'

      - run: npm run test:e2e
        if: steps.e2e-config.outputs.ready == 'true'

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-server-deploy
          path: playwright-report/
          if-no-files-found: ignore
