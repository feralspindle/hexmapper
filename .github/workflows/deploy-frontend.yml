name: Deploy frontend

# Builds the Vue SPA and ships the static dist/ to the droplet, where Caddy serves
# it immediately (no restart). Backend deploys go through deploy/deploy.sh instead.

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths-ignore:
      - 'server/**'
      - 'deploy/**'
      - 'supabase/**'
      - '.github/**'
      - '**/*.md'

concurrency:
  group: deploy-frontend
  cancel-in-progress: true

jobs:
  build-and-ship:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build
        env:
          VITE_API_BASE_URL: /api
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_DEFAULT_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_DEFAULT_KEY }}
          VITE_APP_ENV: production
          VITE_APP_VERSION: ${{ github.sha }}
          VITE_FARO_URL: ${{ secrets.VITE_FARO_URL }}
        run: npm run build

      - name: Ship dist/ to droplet
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          HOST: ${{ secrets.DEPLOY_HOST }}
          USER: ${{ secrets.DEPLOY_USER }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts 2>/dev/null
          rsync -avz --delete -e "ssh -i ~/.ssh/id_ed25519" dist/ "$USER@$HOST:/opt/hexmap/www/"
