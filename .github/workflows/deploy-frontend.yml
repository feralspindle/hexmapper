name: Deploy frontend

# Builds the Vue SPA and ships the static dist/ to the droplet, where Caddy serves
# it immediately (no restart). Backend deploys go through deploy/deploy.sh instead.

on:
  workflow_dispatch: {}
  push:
    branches: [main, staging]
    paths-ignore:
      - 'server/**'
      - 'deploy/**'
      - 'supabase/**'
      - '.github/**'
      - '**/*.md'

concurrency:
  group: deploy-frontend-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  test:
    uses: ./.github/workflows/test-frontend.yml

  build-and-ship:
    needs: test
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'production' || 'staging' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build
        env:
          VITE_API_BASE_URL: /api
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_DEFAULT_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_DEFAULT_KEY }}
          VITE_REALTIME_TRANSPORT: ${{ secrets.VITE_REALTIME_TRANSPORT || 'supabase' }}
          VITE_APP_ENV: ${{ github.ref_name == 'main' && 'production' || 'staging' }}
          VITE_APP_VERSION: ${{ github.sha }}
          VITE_FARO_URL: ${{ secrets.VITE_FARO_URL }}
        run: npm run build

      - name: Ship dist/ to droplet
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          HOST: ${{ secrets.DEPLOY_HOST }}
          USER: ${{ secrets.DEPLOY_USER }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts 2>/dev/null
          rsync -avz --delete -e "ssh -i ~/.ssh/id_ed25519" dist/ "$USER@$HOST:/opt/hexmap/www/"

  e2e-staging:
    needs: build-and-ship
    if: github.ref_name == 'staging'
    runs-on: ubuntu-latest
    environment: staging
    env:
      E2E_BASE_URL: ${{ secrets.E2E_BASE_URL }}
      E2E_GM_EMAIL: ${{ secrets.E2E_GM_EMAIL }}
      E2E_GM_PASSWORD: ${{ secrets.E2E_GM_PASSWORD }}
      E2E_PLAYER1_EMAIL: ${{ secrets.E2E_PLAYER1_EMAIL }}
      E2E_PLAYER1_PASSWORD: ${{ secrets.E2E_PLAYER1_PASSWORD }}
      E2E_PLAYER2_EMAIL: ${{ secrets.E2E_PLAYER2_EMAIL }}
      E2E_PLAYER2_PASSWORD: ${{ secrets.E2E_PLAYER2_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - name: Check E2E secrets
        id: e2e-config
        run: |
          missing=0
          for name in E2E_BASE_URL E2E_GM_EMAIL E2E_GM_PASSWORD E2E_PLAYER1_EMAIL E2E_PLAYER1_PASSWORD E2E_PLAYER2_EMAIL E2E_PLAYER2_PASSWORD; do
            if [ -z "${!name}" ]; then
              echo "::warning::$name is not configured; skipping E2E run"
              missing=1
            fi
          done
          if [ "$missing" -eq 0 ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        if: steps.e2e-config.outputs.ready == 'true'
        with:
          node-version: 20
          cache: npm

      - run: npm ci
        if: steps.e2e-config.outputs.ready == 'true'

      - run: npx playwright install --with-deps chromium
        if: steps.e2e-config.outputs.ready == 'true'

      - run: npm run test:e2e
        if: steps.e2e-config.outputs.ready == 'true'

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-frontend-deploy
          path: playwright-report/
          if-no-files-found: ignore
