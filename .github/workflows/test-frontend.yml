name: Test frontend

# Reusable frontend test suite (Vitest + coverage). Called by ci.yml on PRs and by
# deploy-frontend.yml as a pre-deploy gate, so the suite lives in exactly one place.

on:
  workflow_call: {}

jobs:
  vitest:
    name: Vitest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage

      # Vitest doesn't mount every component, so a broken .vue template can pass
      # the suite and only fail at deploy time. Compile everything here instead.
      - name: Build check
        run: npm run build

      # The Playwright suites only execute nightly / post-deploy on staging; this
      # catches a spec that fails to even parse or collect before it merges.
      - name: E2E spec collection check
        run: npx playwright test --list

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: coverage/
          if-no-files-found: ignore
