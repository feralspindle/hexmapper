name: Test frontend

# Reusable frontend test suite (Vitest + coverage). Called by ci.yml on PRs and by
# deploy-frontend.yml as a pre-deploy gate, so the suite lives in exactly one place.

on:
  workflow_call: {}

jobs:
  vitest:
    name: Vitest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: coverage/
          if-no-files-found: ignore
